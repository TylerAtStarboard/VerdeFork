        function createAttributeEditor(attr) {
            const clamp255 = (value) => Math.max(0, Math.min(255, value));

            const color3ToRgb255 = (color3) => {
                const r = clamp255(Math.round(((color3?.R ?? 0) * 255)));
                const g = clamp255(Math.round(((color3?.G ?? 0) * 255)));
                const b = clamp255(Math.round(((color3?.B ?? 0) * 255)));
                return { r, g, b };
            };

            const rgb255ToHex = (r, g, b) => {
                const rr = clamp255(r).toString(16).padStart(2, "0");
                const gg = clamp255(g).toString(16).padStart(2, "0");
                const bb = clamp255(b).toString(16).padStart(2, "0");
                return `#${rr}${gg}${bb}`;
            };

            const hexToRgb255 = (hex) => {
                const cleaned = (hex || "").trim();
                if (!/^#[0-9a-fA-F]{6}$/.test(cleaned)) return null;
                return {
                    r: parseInt(cleaned.slice(1, 3), 16),
                    g: parseInt(cleaned.slice(3, 5), 16),
                    b: parseInt(cleaned.slice(5, 7), 16),
                };
            };

            const rgb255ToColor3 = (r, g, b) => ({
                R: clamp255(r) / 255,
                G: clamp255(g) / 255,
                B: clamp255(b) / 255,
            });

            const formatRgbBracket = (r, g, b) => `[${clamp255(r)}, ${clamp255(g)}, ${clamp255(b)}]`;

            const parseRgbBracket = (text) => {
                const cleaned = (text || "").trim();
                const match = cleaned.match(/^\[\s*(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})\s*\]$/);
                if (!match) return null;

                const r = clamp255(parseInt(match[1], 10));
                const g = clamp255(parseInt(match[2], 10));
                const b = clamp255(parseInt(match[3], 10));

                return { r, g, b };
            };

            const parseColorInput = (text) => {
                const cleaned = (text || "").trim();

                const bracketResult = parseRgbBracket(cleaned);
                if (bracketResult) return bracketResult;

                const commaParts = cleaned.split(",").map(s => s.trim());
                if (commaParts.length === 3) {
                    const r = clamp255(parseInt(commaParts[0], 10));
                    const g = clamp255(parseInt(commaParts[1], 10));
                    const b = clamp255(parseInt(commaParts[2], 10));
                    if (!isNaN(r) && !isNaN(g) && !isNaN(b)) {
                        return { r, g, b };
                    }
                }

                const singleNum = parseFloat(cleaned);
                if (!isNaN(singleNum) && isFinite(singleNum)) {
                    if (singleNum === 0) return { r: 0, g: 0, b: 0 };
                    if (singleNum === 1) return { r: 255, g: 255, b: 255 };

                    if (singleNum > 0 && singleNum < 1) {
                        const scaled = Math.round(singleNum * 255);
                        return { r: scaled, g: scaled, b: scaled };
                    }

                    const clamped = clamp255(Math.round(singleNum));
                    return { r: clamped, g: clamped, b: clamped };
                }

                return null;
            };

            const type = attr.type;

            switch (type) {
                case "boolean": {
                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.className = "value-checkbox";
                    checkbox.checked = !!attr.value;
                    checkbox.addEventListener("change", () => {
                        postSetAttribute(attr.name, checkbox.checked);
                    });
                    return checkbox;
                }

                case "number": {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    input.value = attr.value ?? "0";
                    input.addEventListener("change", () => {
                        const numericValue = parseFloat(input.value);
                        if (Number.isFinite(numericValue)) {
                            postSetAttribute(attr.name, numericValue);
                        }
                    });
                    return input;
                }

                case "Vector2": {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    if (attr.value && typeof attr.value === "object") {
                        input.value = `${attr.value.X ?? 0}, ${attr.value.Y ?? 0}`;
                    } else {
                        input.value = "0, 0";
                    }
                    input.addEventListener("change", () => {
                        const parts = input.value.split(",").map(s => parseFloat(s.trim()));
                        if (parts.length >= 2 && parts.every(n => Number.isFinite(n))) {
                            postSetAttribute(attr.name, { X: parts[0], Y: parts[1] });
                        }
                    });
                    return input;
                }

                case "Vector3": {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    if (attr.value && typeof attr.value === "object") {
                        input.value = `${attr.value.X ?? 0}, ${attr.value.Y ?? 0}, ${attr.value.Z ?? 0}`;
                    } else {
                        input.value = "0, 0, 0";
                    }
                    input.addEventListener("change", () => {
                        const parts = input.value.split(",").map(s => parseFloat(s.trim()));
                        if (parts.length >= 3 && parts.every(n => Number.isFinite(n))) {
                            postSetAttribute(attr.name, { X: parts[0], Y: parts[1], Z: parts[2] });
                        }
                    });
                    return input;
                }

                case "UDim": {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    if (attr.value && typeof attr.value === "object") {
                        input.value = `${attr.value.Scale ?? 0}, ${attr.value.Offset ?? 0}`;
                    } else {
                        input.value = "0, 0";
                    }
                    input.addEventListener("change", () => {
                        const parts = input.value.split(",").map(s => parseFloat(s.trim()));
                        if (parts.length >= 2 && parts.every(n => Number.isFinite(n))) {
                            postSetAttribute(attr.name, { Scale: parts[0], Offset: parts[1] });
                        }
                    });
                    return input;
                }

                case "UDim2": {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    if (attr.value && attr.value.X && attr.value.Y) {
                        input.value = `${attr.value.X.Scale ?? 0}, ${attr.value.X.Offset ?? 0}, ${attr.value.Y.Scale ?? 0}, ${attr.value.Y.Offset ?? 0}`;
                    } else {
                        input.value = "0, 0, 0, 0";
                    }
                    input.addEventListener("change", () => {
                        const parts = input.value.split(",").map(s => parseFloat(s.trim()));
                        if (parts.length >= 4 && parts.every(n => Number.isFinite(n))) {
                            postSetAttribute(attr.name, {
                                X: { Scale: parts[0], Offset: parts[1] },
                                Y: { Scale: parts[2], Offset: parts[3] }
                            });
                        }
                    });
                    return input;
                }

                case "Color3": {
                    const wrapper = document.createElement("div");
                    wrapper.className = "color3-editor";

                    const swatch = document.createElement("div");
                    swatch.className = "color3-swatch";

                    const swatchBox = document.createElement("div");
                    swatchBox.className = "color3-swatch-box";

                    const colorInput = document.createElement("input");
                    colorInput.type = "color";
                    colorInput.className = "color3-input";

                    const textInput = document.createElement("input");
                    textInput.type = "text";
                    textInput.className = "color3-text";
                    textInput.spellcheck = false;

                    const initial = color3ToRgb255(attr.value);
                    let suppress = false;

                    const setUi = (r, g, b) => {
                        const hex = rgb255ToHex(r, g, b);
                        swatchBox.style.backgroundColor = hex;

                        suppress = true;
                        colorInput.value = hex;
                        textInput.value = formatRgbBracket(r, g, b);
                        suppress = false;
                    };

                    const commit = (r, g, b) => {
                        setUi(r, g, b);
                        postSetAttribute(attr.name, rgb255ToColor3(r, g, b));
                    };

                    setUi(initial.r, initial.g, initial.b);

                    textInput.addEventListener("focus", () => {
                        textInput.select();
                    });

                    textInput.addEventListener("keydown", (e) => {
                        if ([46, 8, 9, 27, 13, 110, 190].indexOf(e.keyCode) !== -1 ||
                            (e.ctrlKey && [65, 67, 86, 88, 90].indexOf(e.keyCode) !== -1) ||
                            [35, 36, 37, 39].indexOf(e.keyCode) !== -1) {
                            return;
                        }
                        if ((e.shiftKey || (e.keyCode < 48 || e.keyCode > 57)) &&
                            (e.keyCode < 96 || e.keyCode > 105) &&
                            e.key !== "," && e.key !== "[" && e.key !== "]") {
                            e.preventDefault();
                        }
                    });

                    colorInput.addEventListener("change", () => {
                        if (suppress) return;
                        const rgb = hexToRgb255(colorInput.value);
                        if (!rgb) return;
                        commit(rgb.r, rgb.g, rgb.b);
                    });

                    textInput.addEventListener("change", () => {
                        if (suppress) return;
                        const rgb = parseColorInput(textInput.value);
                        if (!rgb) {
                            const current = color3ToRgb255(attr.value);
                            setUi(current.r, current.g, current.b);
                            return;
                        }
                        commit(rgb.r, rgb.g, rgb.b);
                    });

                    swatch.appendChild(swatchBox);
                    swatch.appendChild(colorInput);

                    wrapper.appendChild(swatch);
                    wrapper.appendChild(textInput);

                    return wrapper;
                }

                case "NumberRange": {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    if (attr.value && typeof attr.value === "object") {
                        input.value = `${attr.value.Min ?? 0}, ${attr.value.Max ?? 0}`;
                    } else {
                        input.value = "0, 0";
                    }
                    input.addEventListener("change", () => {
                        const parts = input.value.split(",").map(s => parseFloat(s.trim()));
                        if (parts.length >= 2 && parts.every(n => Number.isFinite(n))) {
                            postSetAttribute(attr.name, { Min: parts[0], Max: parts[1] });
                        }
                    });
                    return input;
                }

                case "string": {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    input.value = attr.value ?? "";
                    input.addEventListener("change", () => {
                        postSetAttribute(attr.name, input.value);
                    });
                    return input;
                }

                default: {
                    const input = document.createElement("input");
                    input.type = "text";
                    input.className = "value-input";
                    input.value = attr.value != null ? String(attr.value) : "";
                    input.addEventListener("change", () => {
                        postSetAttribute(attr.name, input.value);
                    });
                    return input;
                }
            }
        }

        function postSetAttribute(attributeName, attributeValue) {
            vscode.postMessage({
                type: "setAttribute",
                attributeName,
                attributeValue
            });
        }

        function openAttributeModal() {
            const modal = document.getElementById("attribute-modal");
            if (!modal) {
                createAttributeModal();
            }
            const modalElement = document.getElementById("attribute-modal");
            modalElement.style.display = "flex";

            const nameInput = document.getElementById("attribute-name-input");
            if (nameInput) {
                nameInput.value = "";
                setTimeout(() => nameInput.focus(), 10);
            }

            const typeSelect = document.getElementById("attribute-type-select");
            if (typeSelect) {
                typeSelect.selectedIndex = 0;
            }

            updateCharCounter();
        }

        function closeAttributeModal() {
            const modal = document.getElementById("attribute-modal");
            if (modal) {
                modal.style.display = "none";
            }
        }

        function createAttributeModal() {
            const modal = document.createElement("div");
            modal.id = "attribute-modal";
            modal.className = "attribute-modal";
            modal.style.display = "none";

            const content = document.createElement("div");
            content.className = "attribute-modal-content";

            const body = document.createElement("div");
            body.className = "attribute-modal-body";

            const nameField = document.createElement("div");
            nameField.className = "attribute-modal-field";
            const nameLabel = document.createElement("label");
            nameLabel.className = "attribute-modal-label";
            nameLabel.textContent = "Name";
            const nameInput = document.createElement("input");
            nameInput.id = "attribute-name-input";
            nameInput.type = "text";
            nameInput.className = "attribute-modal-input";
            nameInput.maxLength = 100;
            nameInput.addEventListener("input", updateCharCounter);
            nameInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    const typeSelect = document.getElementById("attribute-type-select");
                    const name = nameInput.value.trim();
                    const type = typeSelect ? typeSelect.value : "string";
                    if (name) {
                        vscode.postMessage({
                            type: "addAttribute",
                            attributeName: name,
                            attributeType: type
                        });
                        closeAttributeModal();
                    }
                } else if (e.key === "Escape") {
                    closeAttributeModal();
                }
            });
            const charCounter = document.createElement("div");
            charCounter.id = "attribute-char-counter";
            charCounter.className = "attribute-modal-char-counter";
            charCounter.textContent = "0/100";
            nameField.appendChild(nameLabel);
            nameField.appendChild(nameInput);
            nameField.appendChild(charCounter);

            const typeField = document.createElement("div");
            typeField.className = "attribute-modal-field";
            const typeLabel = document.createElement("label");
            typeLabel.className = "attribute-modal-label";
            typeLabel.textContent = "Type";
            const typeSelect = document.createElement("select");
            typeSelect.id = "attribute-type-select";
            typeSelect.className = "attribute-modal-select";

            const types = ["string", "number", "boolean", "Color3", "Vector2", "Vector3", "UDim", "UDim2", "BrickColor", "NumberRange", "NumberSequence", "ColorSequence"];
            for (const type of types) {
                const option = document.createElement("option");
                option.value = type;
                option.textContent = type;
                typeSelect.appendChild(option);
            }

            typeField.appendChild(typeLabel);
            typeField.appendChild(typeSelect);

            body.appendChild(nameField);
            body.appendChild(typeField);

            const footer = document.createElement("div");
            footer.className = "attribute-modal-footer";

            const saveButton = document.createElement("button");
            saveButton.className = "attribute-modal-button primary";
            saveButton.textContent = "Save";
            saveButton.addEventListener("click", () => {
                const name = nameInput.value.trim();
                const type = typeSelect.value;
                if (name) {
                    vscode.postMessage({
                        type: "addAttribute",
                        attributeName: name,
                        attributeType: type
                    });
                    closeAttributeModal();
                }
            });

            const cancelButton = document.createElement("button");
            cancelButton.className = "attribute-modal-button secondary";
            cancelButton.textContent = "Cancel";
            cancelButton.addEventListener("click", closeAttributeModal);

            footer.appendChild(saveButton);
            footer.appendChild(cancelButton);

            content.appendChild(body);
            content.appendChild(footer);
            modal.appendChild(content);

            modal.addEventListener("click", (e) => {
                if (e.target === modal) {
                    closeAttributeModal();
                }
            });

            document.body.appendChild(modal);
        }

        function updateCharCounter() {
            const nameInput = document.getElementById("attribute-name-input");
            const charCounter = document.getElementById("attribute-char-counter");
            if (nameInput && charCounter) {
                charCounter.textContent = `${nameInput.value.length}/100`;
            }
        }

        window.addEventListener("message", (event) => {
            const message = event.data;
            if (message && message.type === "updateProperties") {
                updateProperties(message);
            } else if (message && message.type === "soundPlaybackUpdate") {
                handleSoundPlaybackUpdate(message);
            }
        });

        window.addEventListener("keydown", (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === "z" && !event.shiftKey) {
                event.preventDefault();
                vscode.postMessage({ type: "undo" });
            } else if ((event.ctrlKey || event.metaKey) && event.key === "z" && event.shiftKey) {
                event.preventDefault();
                vscode.postMessage({ type: "redo" });
            } else if ((event.ctrlKey || event.metaKey) && event.key === "y") {
                event.preventDefault();
                vscode.postMessage({ type: "redo" });
            }
        });

        function handleSoundPlaybackUpdate(info) {
            audioPlaying = info.playing;

            if (!audioScrubbing) {
                const scrubberFill = document.querySelector('.audio-scrubber-fill');
                const scrubberHandle = document.querySelector('.audio-scrubber-handle');
                const playBtn = document.querySelector('.audio-play-button');

                if (scrubberFill && scrubberHandle && info.timeLength > 0) {
                    const progress = (info.timePosition / info.timeLength) * 100;
                    scrubberFill.style.width = `${Math.min(100, Math.max(0, progress))}%`;
                    scrubberHandle.style.left = `${Math.min(100, Math.max(0, progress))}%`;
                }

                if (playBtn) {
                    playBtn.title = info.playing ? "Stop" : "Play";
                    if (info.playing) {
                        playBtn.classList.add("playing");
                    } else {
                        playBtn.classList.remove("playing");
                    }
                }
            }
        }
    </script>
</body>
